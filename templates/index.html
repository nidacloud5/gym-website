
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Fit Gym</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-5">
        <h1 class="text-primary">🏋️ Body Fit Gym</h1>
        <p>Stay Fit • Stay Strong 💪</p>
    </div>

    <!-- Workout Images -->
    <div class="row mb-5">
        <h3 class="mb-3">🔥 Workouts</h3>

        <div class="col-md-4">
            <img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e"
                 class="img-fluid rounded shadow">
            <p class="text-center mt-2">Weight Training</p>
        </div>

        <div class="col-md-4">
            <img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74"
                 class="img-fluid rounded shadow">
            <p class="text-center mt-2">Cardio</p>
        </div>

        <div class="col-md-4">
            <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438"
                 class="img-fluid rounded shadow">
            <p class="text-center mt-2">Strength</p>
        </div>
    </div>

    <!-- Form -->
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h3>Add Member</h3>

                    <form action="/add" method="POST">
                        <input type="text" class="form-control mb-2" name="name" placeholder="Name" required>
                        <input type="number" class="form-control mb-2" name="age" placeholder="Age" required>
                        <button class="btn btn-primary w-100">Add Member</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
