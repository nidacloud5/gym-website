<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container py-5">

    <h1 class="text-center text-success mb-5">💪 Gym Members</h1>

    <!-- Client Cards -->
    <div class="row">
        {% for m in members %}
        <div class="col-md-4 mb-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>{{ m.name }}</h5>
                    <p>Age: {{ m.age }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Chart -->
    <div class="mt-5">
        <h3 class="text-center">📊 Age Chart</h3>
        <canvas id="ageChart"></canvas>
    </div>

    <div class="text-center mt-3">
        <a href="/" class="btn btn-primary">⬅ Back</a>
    </div>

</div>

<script>
    const ages = {{ members | map(attribute='age') | list | safe }};
    const names = {{ members | map(attribute='name') | list | safe }};

    new Chart(document.getElementById('ageChart'), {
        type: 'bar',
        data: {
            labels: names,
            datasets: [{
                label: 'Age',
                data: ages
            }]
        }
    });
</script>

</body>
</html>
