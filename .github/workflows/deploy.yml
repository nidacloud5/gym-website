name: Deploy Python App to Azure VM (No Docker)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Copy files to VM
      - name: Copy files to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_IP_ADDRESS }}
          username: azureuser
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "./*"
          target: "/home/azureuser/myapp"

      # Step 3: SSH and run app
      - name: Run app.py on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP_ADDRESS }}
          username: azureuser
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            mkdir -p /home/azureuser/myapp
            cd /home/azureuser/myapp

            # Stop old app
            pkill -f app.py || true

            # Install dependencies
            pip3 install -r requirements.txt

            # Run app in background
            nohup python3 app.py > app.log 2>&1 &

            echo "✅ App deployed and running"